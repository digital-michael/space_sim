version: v2

inputs:
  - directory: api/proto

plugins:
  # Generate protobuf Go message types (*.pb.go).
  - remote: buf.build/protocolbuffers/go
    out: api/gen
    opt:
      - paths=source_relative

  # Generate ConnectRPC Go service stubs (*_grpc.pb.go + connect handler interfaces).
  - remote: buf.build/connectrpc/go
    out: api/gen
    opt:
      - paths=source_relative
